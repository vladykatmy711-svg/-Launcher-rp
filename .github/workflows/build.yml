name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Update Gradle wrapper
        run: ./gradlew wrapper --gradle-version=8.6 --distribution-type=bin

      - name: Clean Gradle cache
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/wrapper/

      - name: Wipe Android SDK
        run: |
          rm -rf $ANDROID_HOME
          mkdir -p $ANDROID_HOME

      - name: Install SDK tools
        run: |
          cd $ANDROID_HOME
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          mkdir -p cmdline-tools
          mv latest cmdline-tools/
          echo "y" | cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34" "build-tools;34.0.0" --verbose
          yes | cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check Gradle version
        run: ./gradlew --version

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ~/.gradle/daemon/*/daemon-*.log
            app/build/reports/
